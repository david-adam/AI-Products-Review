<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Discovery - ProductLens AI</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta name="description" content="Discover trending products - AI-curated picks from ProductLens AI">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            font-weight: bold;
        }

        h1 {
            color: #667eea;
            font-size: 36px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #6c757d;
            font-size: 18px;
        }

        .search-bar {
            margin: 20px auto;
            max-width: 500px;
        }

        .search-bar input {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar input:focus {
            border-color: #667eea;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 30px;
        }

        .product-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .product-image {
            width: 100%;
            height: 180px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 15px;
            background: #f8f9fa;
        }

        .product-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-description {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .product-price {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
        }

        .product-rating {
            color: #f5a623;
            font-size: 14px;
        }

        .product-reviews {
            color: #999;
            font-size: 12px;
            margin-left: 5px;
        }

        .product-category {
            display: inline-block;
            background: #f0f0f0;
            color: #666;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .product-rating-stars {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 18px;
        }

        .star {
            color: #ddd;
            margin-right: 2px;
        }

        .star.filled {
            color: #f5a623;
        }

        .star.half {
            background: linear-gradient(90deg, #f5a623 50%, #ddd 50%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .rating-number {
            margin-left: 8px;
            font-size: 14px;
            color: #666;
        }

        .price-check-text {
            font-size: 14px;
            color: #666;
            font-style: italic;
            margin: 12px 0;
            text-align: center;
        }

        .affiliate-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .affiliate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 18px;
        }

        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }

        .no-products {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 18px;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            padding: 20px;
        }

        .footer-links {
            margin-top: 10px;
        }

        .footer-links a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            opacity: 0.9;
        }

        .footer-links a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .stats {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            color: #6c757d;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            h1 { font-size: 28px; }
            .header { padding: 30px 20px; }
            .products-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">AB</div>
            <h1>Product Discovery</h1>
            <p class="subtitle">AI-Curated Product Insights</p>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search products..." onkeyup="filterProducts()">
            </div>
        </div>

        <!-- Stats -->
        <div class="stats" id="stats">
            <div class="stat-item">
                <div class="stat-value" id="totalProducts">-</div>
                <div class="stat-label">Total Products</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="categoriesCount">-</div>
                <div class="stat-label">Categories</div>
            </div>
        </div>

        <!-- Products -->
        <div class="products-grid" id="productsGrid">
            <div class="loading">
                <div class="loading-spinner"></div>
                Loading products...
            </div>
        </div>

        <!-- No Products Message -->
        <div class="no-products" id="noProducts" style="display: none;">
            No products found. Try a different search term.
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>© 2026 Gadgets Review. All rights reserved.</p>
            <div class="footer-links">
                <a href="privacy-policy.html">Privacy Policy</a>
                <a href="index.html">Home</a>
                <a href="mailto:contact@gadgets-review.space">Contact</a>
            </div>
        </div>
    </div>

    <script>
        let allProducts = [];

        // Fetch products from Turso (with local fallback for network errors only)
        async function fetchProducts() {
            const grid = document.getElementById('productsGrid');

            try {
                // Try to fetch from Turso API
                const response = await fetch('/api/products?limit=100');

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || 'Failed to fetch products');
                }

                allProducts = data.products || [];
                renderProducts(allProducts);
                updateStats(allProducts);

            } catch (error) {
                console.error('Turso API error, trying local fallback:', error.message);

                // Only use local fallback for network errors
                try {
                    const fallbackResponse = await fetch('products_with_content.json');
                    const fallbackData = await fallbackResponse.json();

                    // Transform local data format to match API format
                    allProducts = fallbackData.map(item => ({
                        id: item.id,
                        asin: item.asin,
                        title: item.title || 'N/A',
                        price: item.price,
                        rating: item.rating,
                        reviews: item.reviews,
                        image: item.image,
                        affiliate_link: item.affiliate_link,
                        product_summary: item.product_summary,
                        category: item.search_query
                    }));

                    console.warn('⚠️ Using local fallback data. Run export_from_turso.py to sync with Turso.');
                    renderProducts(allProducts);
                    updateStats(allProducts);

                    // Show warning message
                    const warning = document.createElement('div');
                    warning.style.cssText = 'background: #fff3cd; color: #856404; padding: 10px; margin: 20px; border-radius: 8px; text-align: center;';
                    warning.innerHTML = '⚠️ <strong>Offline Mode:</strong> Using cached local data. Some products may be outdated.';
                    grid.parentNode.insertBefore(warning, grid);

                } catch (fallbackError) {
                    console.error('Local fallback also failed:', fallbackError);
                    grid.innerHTML = `
                        <div class="error-message">
                            <h3>❌ Unable to Load Products</h3>
                            <p><strong>Turso API Error:</strong> ${error.message}</p>
                            <p><strong>Local Cache:</strong> Not available</p>
                            <p style="margin-top: 15px; font-size: 14px;">Please check your connection or run <code>export_from_turso.py</code> to update local cache.</p>
                        </div>
                    `;
                }
            }
        }

        // Generate star rating HTML
        function generateStars(rating) {
            if (!rating) return '<div class="product-rating-stars"><span class="rating-number">No ratings</span></div>';
            
            const numRating = parseFloat(rating);
            if (isNaN(numRating)) return '<div class="product-rating-stars"><span class="rating-number">No ratings</span></div>';
            
            let starsHtml = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= numRating) {
                    starsHtml += '<span class="star filled">★</span>';
                } else if (i - 0.5 <= numRating) {
                    starsHtml += '<span class="star half">★</span>';
                } else {
                    starsHtml += '<span class="star">★</span>';
                }
            }
            
            return `<div class="product-rating-stars">${starsHtml}<span class="rating-number">${numRating.toFixed(1)}</span></div>`;
        }

        // Render products to grid
        function renderProducts(products) {
            const grid = document.getElementById('productsGrid');
            const noProducts = document.getElementById('noProducts');

            if (products.length === 0) {
                grid.style.display = 'none';
                noProducts.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            noProducts.style.display = 'none';

            grid.innerHTML = products.map(product => `
                <div class="product-card" data-title="${(product.title || '').toLowerCase()}">
                    <img class="product-image" src="${product.image || 'https://via.placeholder.com/200x180?text=No+Image'}" 
                         alt="${escapeHtml(product.title)}" 
                         onerror="this.src='https://via.placeholder.com/200x180?text=No+Image'">
                    
                    ${generateStars(product.rating)}
                    
                    <h3 class="product-title">${escapeHtml(product.title || 'Untitled Product')}</h3>
                    
                    ${product.product_summary ? `<p class="product-description">${escapeHtml(product.product_summary)}</p>` : ''}
                    
                    <div class="price-check-text">💰 Check your price on Amazon</div>
                    
                    <a href="${product.affiliate_link || '#'}" class="affiliate-btn" target="_blank" rel="noopener noreferrer">
                        View on Amazon
                    </a>
                </div>
            `).join('');
        }

        // Update stats
        function updateStats(products) {
            document.getElementById('totalProducts').textContent = products.length;
            
            // Count unique categories
            const categories = new Set(products.map(p => p.search_query).filter(Boolean));
            document.getElementById('categoriesCount').textContent = categories.size;
        }

        // Filter products by search
        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(product => {
                const title = (product.title || '').toLowerCase();
                const category = (product.search_query || '').toLowerCase();
                return title.includes(searchTerm) || category.includes(searchTerm);
            });
            renderProducts(filtered);
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        fetchProducts();
    </script>
</body>
</html>
