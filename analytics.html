<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard - ProductLens AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px;
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            color: #00d4ff;
            font-size: 32px;
            margin-bottom: 5px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .time-selector {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 10px 16px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .export-btn {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s, border-color 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 212, 255, 0.5);
        }

        .stat-card .label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 36px;
            font-weight: 700;
            color: #fff;
        }

        .stat-card .change {
            font-size: 13px;
            margin-top: 8px;
        }

        .stat-card .change.positive {
            color: #4ade80;
        }

        .stat-card .change.negative {
            color: #f87171;
        }

        .stat-card.page-views .value { color: #00d4ff; }
        .stat-card.visitors .value { color: #a78bfa; }
        .stat-card.clicks .value { color: #fbbf24; }
        .stat-card.revenue .value { color: #4ade80; }
        .stat-card.searches .value { color: #f472b6; }
        .stat-card.ctr .value { color: #fb923c; }

        /* Charts Section */
        .charts-section {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 1024px) {
            .charts-section {
                grid-template-columns: 1fr;
            }
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chart-card h2 {
            color: #fff;
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-card h2::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, #00d4ff, #0099cc);
            border-radius: 2px;
        }

        .chart-container {
            height: 300px;
            position: relative;
        }

        /* Simple bar chart */
        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 100%;
            padding: 20px 0;
            gap: 8px;
        }

        .bar-item {
            flex: 1;
            max-width: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .bar {
            width: 100%;
            background: linear-gradient(180deg, #00d4ff 0%, #0099cc 100%);
            border-radius: 4px 4px 0 0;
            transition: height 0.5s ease;
            min-height: 4px;
        }

        .bar-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            white-space: nowrap;
        }

        .bar-value {
            font-size: 11px;
            color: #fff;
            font-weight: 600;
        }

        /* Traffic sources */
        .traffic-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .traffic-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .traffic-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .traffic-icon.google { background: rgba(66, 133, 244, 0.2); }
        .traffic-icon.facebook { background: rgba(24, 119, 242, 0.2); }
        .traffic-icon.twitter { background: rgba(29, 161, 242, 0.2); }
        .traffic-icon.direct { background: rgba(156, 163, 175, 0.2); }
        .traffic-icon.other { background: rgba(107, 114, 128, 0.2); }

        .traffic-info {
            flex: 1;
        }

        .traffic-name {
            font-size: 14px;
            color: #fff;
            font-weight: 500;
        }

        .traffic-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 4px;
            overflow: hidden;
        }

        .traffic-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #0099cc);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .traffic-percent {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            min-width: 45px;
            text-align: right;
        }

        /* Products Table */
        .table-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .table-header h2 {
            color: #fff;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-header h2::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, #00d4ff, #0099cc);
            border-radius: 2px;
        }

        .table-sort {
            display: flex;
            gap: 10px;
        }

        .sort-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            padding: 6px 12px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sort-btn.active {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
            color: #00d4ff;
        }

        .sort-btn:hover {
            border-color: #00d4ff;
        }

        .products-table {
            width: 100%;
            border-collapse: collapse;
        }

        .products-table th {
            text-align: left;
            padding: 12px 16px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .products-table td {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .products-table tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .product-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .product-image {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.1);
        }

        .product-info {
            flex: 1;
        }

        .product-title {
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            max-width: 250px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-asin {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
        }

        .metric-cell {
            color: #fff;
            font-weight: 600;
        }

        .metric-cell.views { color: #00d4ff; }
        .metric-cell.clicks { color: #fbbf24; }
        .metric-cell.revenue { color: #4ade80; }
        .metric-cell.ctr { color: #fb923c; }

        /* Search Queries Section */
        .search-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .search-section {
                grid-template-columns: 1fr;
            }
        }

        .search-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .search-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .search-query {
            color: #fff;
            font-size: 14px;
        }

        .search-stats {
            display: flex;
            gap: 20px;
        }

        .search-stat {
            text-align: right;
        }

        .search-stat .count {
            color: #00d4ff;
            font-weight: 600;
        }

        .search-stat .label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Locations */
        .location-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .location-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .location-flag {
            font-size: 24px;
        }

        .location-name {
            flex: 1;
            color: #fff;
            font-size: 14px;
        }

        .location-views {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .location-percent {
            color: #00d4ff;
            font-size: 12px;
            min-width: 40px;
            text-align: right;
        }

        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: rgba(255, 255, 255, 0.6);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(74, 222, 128, 0.9);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-top">
                <div>
                    <h1>📊 Analytics Dashboard</h1>
                    <p>ProductLens AI Performance Metrics</p>
                </div>
                <div class="header-controls">
                    <select class="time-selector" id="timeRange">
                        <option value="7">Last 7 days</option>
                        <option value="30" selected>Last 30 days</option>
                        <option value="90">Last 90 days</option>
                    </select>
                    <button class="export-btn" onclick="exportToCSV()">
                        📥 Export CSV
                    </button>
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card page-views">
                <div class="label">Page Views</div>
                <div class="value" id="pageViews">-</div>
                <div class="change positive" id="pageViewsChange"></div>
            </div>
            <div class="stat-card visitors">
                <div class="label">Unique Visitors</div>
                <div class="value" id="uniqueVisitors">-</div>
            </div>
            <div class="stat-card clicks">
                <div class="label">Amazon Clicks</div>
                <div class="value" id="amazonClicks">-</div>
            </div>
            <div class="stat-card revenue">
                <div class="label">Est. Revenue</div>
                <div class="value" id="totalRevenue">-</div>
            </div>
            <div class="stat-card searches">
                <div class="label">Searches</div>
                <div class="value" id="totalSearches">-</div>
            </div>
            <div class="stat-card ctr">
                <div class="label">Click-Through Rate</div>
                <div class="value" id="ctr">-</div>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="charts-section">
            <!-- Revenue Chart -->
            <div class="chart-card">
                <h2>Revenue Over Time</h2>
                <div class="chart-container" id="revenueChart">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>

            <!-- Traffic Sources -->
            <div class="chart-card">
                <h2>Traffic Sources</h2>
                <div class="traffic-list" id="trafficSources">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>
        </div>

        <!-- Products Table -->
        <div class="table-card">
            <div class="table-header">
                <h2>Top Products</h2>
                <div class="table-sort">
                    <button class="sort-btn active" data-sort="views" onclick="sortProducts('views')">Views</button>
                    <button class="sort-btn" data-sort="clicks" onclick="sortProducts('clicks')">Clicks</button>
                    <button class="sort-btn" data-sort="revenue" onclick="sortProducts('revenue')">Revenue</button>
                </div>
            </div>
            <table class="products-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Views</th>
                        <th>Clicks</th>
                        <th>Revenue</th>
                        <th>CTR</th>
                    </tr>
                </thead>
                <tbody id="productsTable">
                    <tr>
                        <td colspan="5">
                            <div class="loading"><div class="spinner"></div></div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Search & Locations -->
        <div class="search-section">
            <!-- Top Searches -->
            <div class="chart-card">
                <h2>Top Search Queries</h2>
                <div class="search-list" id="topSearches">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>

            <!-- User Locations -->
            <div class="chart-card">
                <h2>User Locations</h2>
                <div class="location-list" id="userLocations">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">Export downloaded!</div>

    <script>
        // State
        let currentDays = 30;
        let currentSort = 'views';
        let productsData = [];
        let overviewData = {};
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadAllData();
            
            // Time range selector
            document.getElementById('timeRange').addEventListener('change', (e) => {
                currentDays = parseInt(e.target.value);
                loadAllData();
            });
        });

        async function loadAllData() {
            await Promise.all([
                loadOverview(),
                loadProducts(),
                loadRevenueChart(),
                loadTrafficSources(),
                loadTopSearches(),
                loadUserLocations()
            ]);
        }

        // Load overview stats
        async function loadOverview() {
            try {
                const response = await fetch(`/api/analytics?type=overview&days=${currentDays}`);
                const data = await response.json();
                
                if (data.success) {
                    overviewData = data.data;
                    document.getElementById('pageViews').textContent = formatNumber(data.data.total_page_views || 0);
                    document.getElementById('uniqueVisitors').textContent = formatNumber(data.data.unique_visitors || 0);
                    document.getElementById('amazonClicks').textContent = formatNumber(data.data.total_amazon_clicks || 0);
                    document.getElementById('totalRevenue').textContent = '$' + formatNumber(data.data.total_revenue || 0);
                    document.getElementById('totalSearches').textContent = formatNumber(data.data.total_searches || 0);
                    document.getElementById('ctr').textContent = (data.data.ctr || 0) + '%';
                }
            } catch (error) {
                console.error('Error loading overview:', error);
                showEmptyState('overview');
            }
        }

        // Load products table
        async function loadProducts() {
            try {
                const response = await fetch(`/api/analytics?type=products&days=${currentDays}&sort=${currentSort}&limit=20`);
                const data = await response.json();
                
                if (data.success && data.data.products) {
                    productsData = data.data.products;
                    renderProductsTable();
                } else {
                    showEmptyState('products');
                }
            } catch (error) {
                console.error('Error loading products:', error);
                showEmptyState('products');
            }
        }

        function renderProductsTable() {
            const tbody = document.getElementById('productsTable');
            
            if (!productsData.length) {
                tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">No product data available</div></td></tr>';
                return;
            }
            
            tbody.innerHTML = productsData.map(product => `
                <tr>
                    <td>
                        <div class="product-cell">
                            <img class="product-image" src="${product.image || 'https://via.placeholder.com/48'}" alt="${product.title || ''}" onerror="this.src='https://via.placeholder.com/48'">
                            <div class="product-info">
                                <div class="product-title" title="${product.title || ''}">${product.title || 'Unknown'}</div>
                                <div class="product-asin">${product.asin || ''}</div>
                            </div>
                        </div>
                    </td>
                    <td class="metric-cell views">${formatNumber(product.page_views || 0)}</td>
                    <td class="metric-cell clicks">${formatNumber(product.amazon_clicks || 0)}</td>
                    <td class="metric-cell revenue">$${formatNumber(product.estimated_revenue || 0)}</td>
                    <td class="metric-cell ctr">${product.ctr || 0}%</td>
                </tr>
            `).join('');
        }

        function sortProducts(sort) {
            currentSort = sort;
            
            // Update button states
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.sort === sort);
            });
            
            // Reload products with new sort
            loadProducts();
        }

        // Load revenue chart
        async function loadRevenueChart() {
            try {
                const response = await fetch(`/api/analytics?type=revenue&days=${currentDays}`);
                const data = await response.json();
                
                const container = document.getElementById('revenueChart');
                
                if (data.success && data.data.revenue && data.data.revenue.length) {
                    const revenue = data.data.revenue;
                    const maxRevenue = Math.max(...revenue.map(r => r.revenue || 0));
                    
                    container.innerHTML = `
                        <div class="bar-chart">
                            ${revenue.slice(-14).map(item => `
                                <div class="bar-item">
                                    <div class="bar-value">$${(item.revenue || 0).toFixed(0)}</div>
                                    <div class="bar" style="height: ${maxRevenue > 0 ? ((item.revenue / maxRevenue) * 200) : 0}px"></div>
                                    <div class="bar-label">${item.date ? item.date.slice(5) : ''}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    container.innerHTML = '<div class="empty-state">No revenue data available</div>';
                }
            } catch (error) {
                console.error('Error loading revenue chart:', error);
                document.getElementById('revenueChart').innerHTML = '<div class="empty-state">Failed to load chart</div>';
            }
        }

        // Load traffic sources
        async function loadTrafficSources() {
            try {
                const response = await fetch(`/api/analytics?type=traffic&days=${currentDays}`);
                const data = await response.json();
                
                const container = document.getElementById('trafficSources');
                
                if (data.success && data.data.sources && data.data.sources.length) {
                    const sources = data.data.sources;
                    
                    container.innerHTML = sources.map(source => {
                        const iconClass = source.source.toLowerCase();
                        const icons = {
                            'google': '🔍',
                            'facebook': '📘',
                            'twitter': '🐦',
                            'instagram': '📸',
                            'pinterest': '📌',
                            'reddit': '🤖',
                            'tiktok': '🎵',
                            'direct': '🏠',
                            'other': '🌐'
                        };
                        
                        return `
                            <div class="traffic-item">
                                <div class="traffic-icon ${iconClass}">${icons[iconClass] || '🌐'}</div>
                                <div class="traffic-info">
                                    <div class="traffic-name">${source.source}</div>
                                    <div class="traffic-bar">
                                        <div class="traffic-bar-fill" style="width: ${source.percentage}%"></div>
                                    </div>
                                </div>
                                <div class="traffic-percent">${source.percentage}%</div>
                            </div>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = '<div class="empty-state">No traffic data available</div>';
                }
            } catch (error) {
                console.error('Error loading traffic:', error);
                document.getElementById('trafficSources').innerHTML = '<div class="empty-state">Failed to load traffic data</div>';
            }
        }

        // Load top searches
        async function loadTopSearches() {
            try {
                const response = await fetch(`/api/analytics?type=searches&days=${currentDays}&limit=10`);
                const data = await response.json();
                
                const container = document.getElementById('topSearches');
                
                if (data.success && data.data.searches && data.data.searches.length) {
                    const searches = data.data.searches;
                    
                    container.innerHTML = searches.map(search => `
                        <div class="search-item">
                            <span class="search-query">${search.query || ''}</span>
                            <div class="search-stats">
                                <div class="search-stat">
                                    <div class="count">${search.search_count || 0}</div>
                                    <div class="label">searches</div>
                                </div>
                                <div class="search-stat">
                                    <div class="count">${search.clicks || 0}</div>
                                    <div class="label">clicks</div>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="empty-state">No search data available</div>';
                }
            } catch (error) {
                console.error('Error loading searches:', error);
                document.getElementById('topSearches').innerHTML = '<div class="empty-state">Failed to load search data</div>';
            }
        }

        // Load user locations
        async function loadUserLocations() {
            try {
                const response = await fetch(`/api/analytics?type=locations&days=${currentDays}`);
                const data = await response.json();
                
                const container = document.getElementById('userLocations');
                
                // Country code to flag emoji
                const countryFlags = {
                    'US': '🇺🇸', 'GB': '🇬🇧', 'DE': '🇩🇪', 'FR': '🇫🇷', 'JP': '🇯🇵',
                    'CA': '🇨🇦', 'AU': '🇦🇺', 'IN': '🇮🇳', 'BR': '🇧🇷', 'MX': '🇲🇽',
                    'ES': '🇪🇸', 'IT': '🇮🇹', 'NL': '🇳🇱', 'SE': '🇸🇪', 'CH': '🇨🇭',
                    'Unknown': '🌍'
                };
                
                if (data.success && data.data.locations && data.data.locations.length) {
                    const locations = data.data.locations;
                    
                    container.innerHTML = locations.map(loc => `
                        <div class="location-item">
                            <span class="location-flag">${countryFlags[loc.country] || '🌍'}</span>
                            <span class="location-name">${loc.country}</span>
                            <span class="location-views">${formatNumber(loc.views)}</span>
                            <span class="location-percent">${loc.percentage}%</span>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="empty-state">No location data available</div>';
                }
            } catch (error) {
                console.error('Error loading locations:', error);
                document.getElementById('userLocations').innerHTML = '<div class="empty-state">Failed to load location data</div>';
            }
        }

        // Export to CSV
        function exportToCSV() {
            // Create CSV content from products data
            if (!productsData.length) {
                showToast('No data to export');
                return;
            }
            
            const headers = ['ASIN', 'Title', 'Price', 'Category', 'Page Views', 'Amazon Clicks', 'Est. Revenue', 'CTR'];
            const rows = productsData.map(p => [
                p.asin || '',
                (p.title || '').replace(/,/g, ';'),
                p.price || '',
                p.category || '',
                p.page_views || 0,
                p.amazon_clicks || 0,
                p.estimated_revenue || 0,
                (p.ctr || 0) + '%'
            ]);
            
            const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
            
            // Download file
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `productlens-analytics-${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast('📥 Export downloaded!');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num ? num.toLocaleString() : '0';
        }

        function showEmptyState(type) {
            console.log(`Empty state for ${type}`);
        }
    </script>
</body>
</html>
